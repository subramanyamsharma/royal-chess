<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy – Royal Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --wood-mid: #c8902a; --wood-dark: #7a4a10; --wood-deep: #3d1f05;
  --board-light: #f0d9a0; --board-dark: #b8813e;
  --gold: #d4a843; --gold-light: #f5d878; --cream: #faf3e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center,#2a1200 0%,#0d0600 100%); min-height:100vh; font-family:'Crimson Text',serif; color:var(--cream); display:flex; flex-direction:column; align-items:center; }
.container { width:100%; max-width:900px; padding:20px; display:flex; flex-direction:column; align-items:center; flex:1; }
h1 { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); text-shadow:0 0 28px rgba(212,168,67,.4); margin-bottom:4px; }
.sub { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.4em; color:var(--wood-mid); text-transform:uppercase; margin-bottom:20px; }
.back-link { font-family:'Cinzel',serif; font-size:.78rem; color:var(--gold-light); text-decoration:none; letter-spacing:.1em; margin-bottom:20px; transition:color .2s; }
.back-link:hover { color:var(--gold); }
.policy-frame { width:100%; flex:1; min-height:600px; border:2px solid var(--wood-mid); border-radius:12px; background:#fff; }
.external-link { margin-top:16px; font-family:'Cinzel',serif; font-size:.74rem; letter-spacing:.1em; }
.external-link a { color:var(--gold-light); text-decoration:none; transition:color .2s; }
.external-link a:hover { color:var(--gold); text-decoration:underline; }
</style>
</head>
<body>
<div class="container">
  <h1>♞ Royal Chess ♟</h1>
  <p class="sub">Privacy Policy</p>
  <a href="/" class="back-link">← Back to Game</a>
  <iframe class="policy-frame" src="https://www.termsfeed.com/live/35de9f83-33dc-40d4-b619-18d6e4c085fa" title="Privacy Policy" frameborder="0"></iframe>
  <p class="external-link">View full policy at <a href="https://www.termsfeed.com/live/35de9f83-33dc-40d4-b619-18d6e4c085fa" target="_blank" rel="noopener noreferrer">TermsFeed</a></p>
</div>
</body>
</html>
